spring.application.name=tourism-backend

server.port=8080



# Database

spring.datasource.url=jdbc:mysql://localhost:3306/tourism_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

spring.datasource.username=root

spring.datasource.password=indu

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver



# JPA

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true



# JWT

jwt.secret=tourism_secret_key_that_is_at_least_256_bits_long_for_hs256_algorithm

jwt.expiration=86400000



# File Upload

spring.servlet.multipart.max-file-size=10MB

spring.servlet.multipart.max-request-size=10MB
file.upload-dir=uploads



# GitHub Storage

github.token="YOUR_GITHUB_TOKEN"

github.api.token=${github.token}

github.username="GITHUB_USER_NAME"

github.repository="GITHUB_USER_REPO_NAME"

github.places-folder=places

github.hotels-folder=hotels

github.packages-folder=packages

github.users-folder=users